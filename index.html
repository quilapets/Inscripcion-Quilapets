<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Quilapets - Club de Amigos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #1a2e1a;
        }
        .hidden-field { display: none !important; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #A4F13E;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-lg mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-[#A4F13E]">
        <div class="p-8">
            <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Únete al Club Quilapets 🐾</h1>
            
            <form id="petForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Nombre del Tutor</label>
                    <input type="text" name="nombre_tutor" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">WhatsApp (11 dígitos: 569...)</label>
                    <input type="number" name="whatsapp" id="whatsapp" required placeholder="56912345678" class="w-full p-2 border rounded">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">¿Qué mascota tienes?</label>
                    <select name="especie" id="especie" required class="w-full p-2 border rounded" onchange="toggleFields()">
                        <option value="perro">Perro</option>
                        <option value="gato">Gato</option>
                        <option value="otro">Otro (Conejo, Hurón, etc.)</option>
                    </select>
                </div>

                <div id="campos_comunes">
                    <label class="block text-sm font-semibold text-gray-700">Raza</label>
                    <input type="text" name="raza" id="raza" class="w-full p-2 border rounded">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">Marca de Alimento Actual</label>
                    <input type="text" name="alimento_actual" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Formato del saco (Kg)</label>
                    <input type="number" name="formato_kg" required class="w-full p-2 border rounded" placeholder="Ej: 15">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gray-800 text-[#A4F13E] font-bold py-3 rounded-lg hover:bg-black transition-all">
                    UNIRSE AL CLUB
                </button>
            </form>

            <div id="successMessage" class="hidden-field text-center p-6 text-green-600 font-bold">
                ¡Registro Exitoso! Bienvenido al Club.
            </div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzMOOpp2jUyXX1oBs_vfCCIvqkEGTT-I1FHfTdCt7crJyHQhN2dT5nDbfQ-2Wzvix2Z-A/exec"; 

        function toggleFields() {
            const especie = document.getElementById('especie').value;
            const campos = document.getElementById('campos_comunes');
            if (especie === 'otro') {
                campos.classList.add('hidden-field');
                document.getElementById('raza').required = false;
            } else {
                campos.classList.remove('hidden-field');
                document.getElementById('raza').required = true;
            }
        }

        document.getElementById('petForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const whatsapp = document.getElementById('whatsapp').value;

            if(whatsapp.length !== 11) {
                alert("El WhatsApp debe tener 11 dígitos (Ej: 56912345678)");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                this.classList.add('hidden-field');
                document.getElementById('successMessage').classList.remove('hidden-field');
            } catch (err) {
                alert("Error de conexión. Intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = "UNIRSE AL CLUB";
            }
        });
    </script>
</body>
</html>
